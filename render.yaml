services:
  # Backend Express API Server
  - type: web
    name: nutriai-api
    env: node
    plan: starter # Starter plan is required for attaching a persistent storage disk
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm --filter "@workspace/api-server" run start
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: CLERK_SECRET_KEY
        sync: false # User will input this on Render dashboard
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai/
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: USE_OLLAMA
        value: "false"
      - key: FALLBACK_ON_AI_ERROR
        value: "true"
      - key: JWT_SECRET
        generateValue: true # Generates a random secure key
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: api-data
      mountPath: /data
      sizeGB: 1

  # Frontend static client
  - type: web
    name: nutriai-client
    runtime: static
    buildCommand: pnpm install && pnpm --filter "@workspace/diet-assistant" run build
    staticPublishPath: artifacts/diet-assistant/dist/public
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: nutriai-api
          type: web
          property: host
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
